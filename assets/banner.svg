<svg width="1200" height="320" viewBox="0 0 1200 320" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#060310"/>
      <stop offset="50%" stop-color="#0c0820"/>
      <stop offset="100%" stop-color="#08051a"/>
    </linearGradient>
    <radialGradient id="glowPurple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.5"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowOrange" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ff9950" stop-opacity="0.4"/>
      <stop offset="100%" stop-color="#ff9950" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#b794f6"/>
      <stop offset="55%" stop-color="#ff9950"/>
      <stop offset="100%" stop-color="#ff5c7a"/>
    </linearGradient>
    <linearGradient id="lineGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8b5cf6" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ff5c7a" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="softBlur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <circle cx="150" cy="90" r="170" fill="url(#glowPurple)"/>
  <circle cx="1040" cy="250" r="190" fill="url(#glowOrange)"/>

  <!-- connection mesh, left third -->
  <g stroke="url(#lineGrad)" stroke-width="1" opacity="0.5">
    <line x1="55" y1="55" x2="215" y2="110"><animate attributeName="opacity" values="0.2;0.75;0.2" dur="4s" repeatCount="indefinite"/></line>
    <line x1="55" y1="140" x2="215" y2="110"><animate attributeName="opacity" values="0.65;0.15;0.65" dur="3.3s" repeatCount="indefinite"/></line>
    <line x1="55" y1="225" x2="215" y2="170"><animate attributeName="opacity" values="0.3;0.85;0.3" dur="5s" repeatCount="indefinite"/></line>
    <line x1="215" y1="110" x2="375" y2="65"><animate attributeName="opacity" values="0.75;0.2;0.75" dur="3.7s" repeatCount="indefinite"/></line>
    <line x1="215" y1="110" x2="375" y2="150"><animate attributeName="opacity" values="0.2;0.65;0.2" dur="4.5s" repeatCount="indefinite"/></line>
    <line x1="215" y1="170" x2="375" y2="150"><animate attributeName="opacity" values="0.55;0.15;0.55" dur="2.9s" repeatCount="indefinite"/></line>
    <line x1="215" y1="170" x2="375" y2="215"><animate attributeName="opacity" values="0.25;0.8;0.25" dur="4s" repeatCount="indefinite"/></line>
    <line x1="375" y1="65" x2="530" y2="110"><animate attributeName="opacity" values="0.65;0.2;0.65" dur="4.2s" repeatCount="indefinite"/></line>
    <line x1="375" y1="150" x2="530" y2="110"><animate attributeName="opacity" values="0.3;0.75;0.3" dur="3.4s" repeatCount="indefinite"/></line>
  </g>

  <g fill="#b794f6">
    <circle cx="55" cy="55" r="3.5"/>
    <circle cx="55" cy="140" r="3.5"/>
    <circle cx="55" cy="225" r="3.5"/>
    <circle cx="215" cy="110" r="4.5"/>
    <circle cx="215" cy="170" r="4.5"/>
  </g>
  <g fill="#ff9950">
    <circle cx="375" cy="65" r="4"/>
    <circle cx="375" cy="150" r="4"/>
    <circle cx="375" cy="215" r="4"/>
  </g>
  <g fill="#ff5c7a">
    <circle cx="530" cy="110" r="4.5"/>
  </g>

  <!-- floating code / stack glyphs, right side -->
  <g font-family="Menlo, Consolas, monospace" fill="#8b5cf6" opacity="0.4" font-size="15">
    <text x="740" y="55">const app = express()</text>
    <text x="860" y="95">SELECT * FROM links;</text>
    <text x="990" y="45">@app.post("/scan")</text>
    <text x="760" y="140">docker compose up</text>
    <text x="900" y="180">async def predict():</text>
    <text x="1020" y="130">git commit -m "fix"</text>
    <text x="740" y="230">useEffect(() =&gt; {}</text>
    <text x="900" y="265">status: 200 OK</text>
    <text x="1010" y="230">PostgreSQL · NestJS</text>
  </g>

  <!-- headline -->
  <text x="60" y="185" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="url(#textGrad)">SATYAM DIWAKER</text>
  <text x="61" y="185" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="46" font-weight="700" fill="url(#textGrad)" opacity="0.3" filter="url(#softBlur)">SATYAM DIWAKER</text>
  <text x="60" y="220" font-family="'Segoe UI', Helvetica, Arial, sans-serif" font-size="16" letter-spacing="2.2" fill="#e6d9ff" opacity="0.9">
    FULL-STACK DEVELOPER  &#183;  REACT &amp; FASTAPI  &#183;  CLOUD &amp; CYBERSECURITY
  </text>

  <rect x="60" y="240" width="440" height="1.4" fill="url(#textGrad)" opacity="0.7"/>
</svg>
