<svg width="1200" height="300" viewBox="0 0 1200 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0A0118"/>
      <stop offset="50%" stop-color="#170A33"/>
      <stop offset="100%" stop-color="#0A0118"/>
    </linearGradient>
    <linearGradient id="titleGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#A87CFF"/>
      <stop offset="55%" stop-color="#D2AEFF"/>
      <stop offset="100%" stop-color="#FF9A44"/>
    </linearGradient>
    <radialGradient id="glowL" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#A87CFF" stop-opacity="0.30"/>
      <stop offset="100%" stop-color="#A87CFF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowR" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#FF9A44" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="#FF9A44" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="300" fill="url(#bgGrad)"/>
  <circle cx="150" cy="80" r="150" fill="url(#glowL)"/>
  <circle cx="1060" cy="220" r="170" fill="url(#glowR)"/>

  <!-- faint grid -->
  <g stroke="#3A2266" stroke-width="0.6" opacity="0.35">
    <line x1="0" y1="60" x2="1200" y2="60"/>
    <line x1="0" y1="240" x2="1200" y2="240"/>
    <line x1="200" y1="0" x2="200" y2="300"/>
    <line x1="1000" y1="0" x2="1000" y2="300"/>
  </g>

  <!-- network connections -->
  <g stroke="#FF4D4D" stroke-width="1" opacity="0.3">
    <line x1="70" y1="55" x2="210" y2="105"><animate attributeName="opacity" values="0.1;0.4;0.1" dur="4.2s" repeatCount="indefinite"/></line>
    <line x1="210" y1="105" x2="140" y2="215"><animate attributeName="opacity" values="0.35;0.08;0.35" dur="3.6s" repeatCount="indefinite"/></line>
    <line x1="140" y1="215" x2="290" y2="245"><animate attributeName="opacity" values="0.12;0.38;0.12" dur="4.9s" repeatCount="indefinite"/></line>
    <line x1="930" y1="45" x2="1075" y2="85"><animate attributeName="opacity" values="0.35;0.08;0.35" dur="3.9s" repeatCount="indefinite"/></line>
    <line x1="1075" y1="85" x2="1010" y2="205"><animate attributeName="opacity" values="0.1;0.35;0.1" dur="4.4s" repeatCount="indefinite"/></line>
    <line x1="1010" y1="205" x2="1140" y2="235"><animate attributeName="opacity" values="0.3;0.06;0.3" dur="3.3s" repeatCount="indefinite"/></line>
  </g>

  <g fill="#A87CFF">
    <circle cx="70" cy="55" r="3.5"><animate attributeName="r" values="2.8;4.6;2.8" dur="2.5s" repeatCount="indefinite"/></circle>
    <circle cx="210" cy="105" r="3" fill="#FF9A44"><animate attributeName="r" values="2.2;4;2.2" dur="3.1s" repeatCount="indefinite"/></circle>
    <circle cx="140" cy="215" r="3.5"><animate attributeName="r" values="2.8;4.6;2.8" dur="2.8s" repeatCount="indefinite"/></circle>
    <circle cx="290" cy="245" r="3" fill="#FF9A44"><animate attributeName="r" values="2;3.8;2" dur="3.5s" repeatCount="indefinite"/></circle>
    <circle cx="930" cy="45" r="3.5"><animate attributeName="r" values="2.8;4.6;2.8" dur="2.6s" repeatCount="indefinite"/></circle>
    <circle cx="1075" cy="85" r="3" fill="#FF9A44"><animate attributeName="r" values="2.2;4;2.2" dur="3.2s" repeatCount="indefinite"/></circle>
    <circle cx="1010" cy="205" r="3.5"><animate attributeName="r" values="2.8;4.6;2.8" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="1140" cy="235" r="3" fill="#FF9A44"><animate attributeName="r" values="2;3.8;2" dur="3.7s" repeatCount="indefinite"/></circle>
  </g>

  <!-- floating particles -->
  <g fill="#D2AEFF" opacity="0.6">
    <circle cx="420" cy="38" r="1.8"><animate attributeName="cy" values="38;56;38" dur="5.2s" repeatCount="indefinite"/></circle>
    <circle cx="500" cy="262" r="2"><animate attributeName="cy" values="262;240;262" dur="4.6s" repeatCount="indefinite"/></circle>
    <circle cx="740" cy="34" r="1.6"><animate attributeName="cy" values="34;52;34" dur="5.6s" repeatCount="indefinite"/></circle>
    <circle cx="800" cy="264" r="1.8" fill="#FF9A44"><animate attributeName="cy" values="264;244;264" dur="4.9s" repeatCount="indefinite"/></circle>
  </g>

  <!-- floating code -->
  <g font-family="Fira Code, monospace" font-size="12.5" fill="#6C4FA6" opacity="0.5">
    <text x="35" y="272"><animate attributeName="opacity" values="0.18;0.55;0.18" dur="6.2s" repeatCount="indefinite"/>app.get('/scan', handler)</text>
    <text x="960" y="272"><animate attributeName="opacity" values="0.5;0.15;0.5" dur="5.7s" repeatCount="indefinite"/>SELECT * FROM users;</text>
    <text x="985" y="32" font-size="12"><animate attributeName="opacity" values="0.15;0.48;0.15" dur="6.6s" repeatCount="indefinite"/>docker build -t app .</text>
    <text x="30" y="32" font-size="12"><animate attributeName="opacity" values="0.48;0.15;0.48" dur="6s" repeatCount="indefinite"/>const [state] = useState()</text>
  </g>

  <!-- title -->
  <text x="600" y="150" text-anchor="middle" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="700" font-size="46" fill="url(#titleGrad)">SATYAM DIWAKER</text>

  <text x="600" y="185" text-anchor="middle" font-family="Fira Code, monospace" font-size="14.5" fill="#E6D9FF" opacity="0.85">
    Full-Stack Developer &#8226; React &#183; Node.js &#183; FastAPI &#183; PostgreSQL
  </text>

  <g font-family="Fira Code, monospace" font-size="12.5" fill="#FF9A44" opacity="0.8" text-anchor="middle">
    <text x="600" y="218">Cloud Computing &#183; Cybersecurity &#183; Docker &#183; AI-Integrated Web Apps</text>
  </g>

  <rect x="320" y="252" width="560" height="1.5" fill="url(#titleGrad)" opacity="0.5">
    <animate attributeName="width" values="0;560;0" dur="7.5s" repeatCount="indefinite"/>
    <animate attributeName="x" values="600;320;600" dur="7.5s" repeatCount="indefinite"/>
  </rect>
</svg>
